sonar.projectKey=helton-godoy_LightlyShaders
sonar.organization=helton-godoy
sonar.projectName=LightlyShaders
sonar.projectVersion=3.0.0

sonar.sources=src
sonar.sourceEncoding=UTF-8

# Desabilitar análise C/C++ pois requer compilação (dependências KF6/Qt6 não disponíveis no CI)
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

sonar.exclusions=build/**,build-qt6/**,**/*.so,**/*.frag,**/*.vert,**/*.qrc,**/*.sh

sonar.clangtidy.reportPaths=clang-tidy-report.txt

sonar.cpp.cppcheck.reportPaths=cppcheck-report.xml

sonar.host.url=https://sonarcloud.io
