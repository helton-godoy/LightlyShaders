name: SonarCloud Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libkf6config-dev libqt6core6-dev libqt6widgets6-dev libqt6gui6-dev libxtst-dev libx11-dev libxext-dev libxrender-dev libxkbcommon-dev libxcb1-dev libepoxy-dev libkwingdevicematch6-dev libkwingesturehandlergestures-dev

      - name: Install build-wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip build-wrapper.zip

      - name: Create build directory
        run: mkdir -p build

      - name: Configure
        working-directory: build
        run: cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build with build-wrapper
        run: |
          ./build-wrapper-linux-x86-64/build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build --parallel $(nproc)

      - name: Run SonarCloud Scanner
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.build-wrapper-output=bw-output
