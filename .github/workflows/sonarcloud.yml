name: SonarCloud Code Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud Scanner
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=helton-godoy_LightlyShaders
            -Dsonar.organization=helton-godoy
            -Dsonar.sources=src
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=build/**,build-qt6/**,**/*.so,**/*.frag,**/*.vert,**/*.qrc,**/*.sh
            -Dsonar.cfamily.analysisCache.mode=disabled

  # Job separado para compilação (sem falhar o workflow)
  build-check:
    name: Build Check (Optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libxtst-dev libx11-dev libxext-dev libxrender-dev libxkbcommon-dev libxcb1-dev libepoxy-dev
          echo "Nota: Pacotes KF6/Qt6 e KWin não estão disponíveis nos repositórios Ubuntu"
          echo "A compilação completa requer KDE Neon ou Arch Linux"

      - name: Check CMake configuration
        run: |
          mkdir -p build
          # Tentar configurar, mas não falhar se faltar dependências
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release || echo "CMake falhou - dependências KF6/Qt6 não disponíveis"
